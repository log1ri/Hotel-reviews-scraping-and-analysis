name: Deploy to GCP

on:
  push:
    branches:
      - main
    paths-ignore: 
      - '**.md'           
      - '.env.example'  
      - '.gitignore'
      - '*.ipynb'
      - 'LICENSE'
      - 'docs/**'

env:
  PROJECT_ID: hotel-reviews-500211
  REGION: asia-southeast3
  IMAGE: asia-southeast3-docker.pkg.dev/hotel-reviews-500211/hotel-reviews/hotel-reviews-pipeline
  JOB: hotel-reviews-pipeline

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      
      # Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Set up Docker
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast3-docker.pkg.dev --quiet

      # Build and push Docker image
      - name: Build image
        run: docker build -t $IMAGE:latest .

      # Push the Docker image to Artifact Registry
      - name: Push image
        run: docker push $IMAGE:latest

      # Deploy to Cloud Run Job
      - name: Deploy to Cloud Run Job
        run: gcloud run jobs update $JOB --image $IMAGE:latest --region $REGION
